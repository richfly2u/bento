<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 擺盤大師 - 專屬雲端廚房</title>
    <link rel="stylesheet" href="css/bento-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bento-body">
    <header style="display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: #1e222d; border-bottom: 1px solid #2d3340;">
        <h2 style="color: #D4A843; margin: 0;">🍱 3D 擺盤大師</h2>

        <div style="display:flex; gap:8px; align-items:center;" class="normal-tools">
            <button class="btn auth-required" style="background:var(--gold); color:white; border:none; padding:6px 10px; font-size:12px;" onclick="checkAuthAndRun(function(){ window.open('extractor.html', '_blank'); })">✂️ 擷取實驗室</button>
            <button id="login-btn" class="btn" style="background:var(--blue); color:white; border:none; padding:6px 12px; font-size:12px;" onclick="handleAuthClick()">🔑 會員登入</button>
        </div>
    </header>

    <main id="app-container" style="display: flex; height: calc(100vh - 60px);">
        
        <aside style="width: 250px; background: #1a1e29; padding: 15px; overflow-y: auto; border-right: 1px solid #2d3340;">
            <h3 style="color: #fff; margin-top: 0; font-size: 1rem;">📦 選擇餐盒</h3>
            <div id="tpl-list" class="tpl-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                </div>
        </aside>

        <section style="flex: 1; display: flex; flex-direction: column; position: relative;">
            <div id="viewport" style="flex: 1; background: #12141c; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative;">
                <canvas id="renderCanvas" style="width: 100%; height: 100%; touch-action: none;"></canvas>
            </div>
            
            <div style="padding: 12px; background: #1e222d; text-align: center; border-top: 1px solid #2d3340;">
                <button class="btn" style="background: #4caf50; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-right: 10px;">💾 儲存擺盤</button>
                <button class="btn" style="background: #e85c5c; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">🗑️ 清空餐盒</button>
            </div>
        </section>

        <aside style="width: 300px; background: #1a1e29; padding: 15px; overflow-y: auto; border-left: 1px solid #2d3340;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 style="color: #fff; margin: 0; font-size: 1rem;">🥦 食材庫</h3>
                <button class="btn" style="background: #4f8ef7; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold;" onclick="loadDefaultFoods()">📥 恢復預設食材</button>
            </div>
            
            <div id="food-list" class="food-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;">
                </div>
        </aside>
    </main>

    <script src="https://www.gstatic.com/firebasejs/9.16.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.16.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.16.0/firebase-firestore-compat.js"></script>
    
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    
    <script src="js/core/auth.js"></script>
    <script src="js/bento/main.js"></script>

    <script>
        window.checkAuthAndRun = function(callback) {
            // 確認 Firebase Auth 是否已載入並有使用者登入
            if (typeof firebase !== 'undefined' && firebase.auth().currentUser) {
                callback();
            } else {
                alert("🔒 此功能僅限會員使用，請先點擊右上角登入！");
            }
        };
    </script>
</body>
</html>
